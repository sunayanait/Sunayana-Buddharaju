<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Buddharaju Sunayana</title>

<style>

body{
    margin:0;
    font-family:Arial, sans-serif;
    background:#f2f6fc;
}

header{
    background:#1a237e;
    color:white;
    text-align:center;
    padding:30px;
}

header h1{
    margin:0;
}

.welcome{
    text-align:center;
    padding:20px;
    color:#333;
}

.course-container{
    max-width:900px;
    margin:auto;
    padding:20px;
}

.course-card{
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 0 10px rgba(0,0,0,0.1);
}

.module{
    margin-top:25px;
    padding:15px;
    background:#eef3ff;
    border-radius:8px;
}

.module h3{
    margin-top:0;
    color:#1a237e;
}

input[type=file]{
    margin-top:10px;
}

.upload-btn{
    margin-top:10px;
    padding:10px 20px;
    background:#3949ab;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.upload-btn:hover{
    background:#283593;
}

footer{
    margin-top:30px;
    text-align:center;
    background:#1a237e;
    color:white;
    padding:15px;
}

</style>
</head>

<body>

<header>
    <h1>Buddharaju Sunayana</h1>
</header>

<div class="welcome">
    <h2>Welcome to my courses</h2>
</div>

<div class="course-container">

<div class="course-card">

<h2>Course: Quantum Computing</h2>

<!-- Notes -->
<div class="module">
<h3>Notes</h3>

<input
type="file"
accept=".pdf,.doc,.docx"
multiple>

<br>

<button class="upload-btn">
Upload Notes
</button>

</div>

<!-- Assignments -->
<div class="module">
<h3>Assignments</h3>

<input
type="file"
accept=".pdf,.doc,.docx"
multiple>

<br>

<button class="upload-btn">
Upload Assignments
</button>

</div>

<!-- Pedagogy -->
<div class="module">
<h3>Pedagogy</h3>

<input
type="file"
accept=".pdf,.doc,.docx"
multiple>

<br>

<button class="upload-btn">
Upload Pedagogy Files
</button>

</div>

<!-- Assessments -->
<div class="module">
<h3>Assessments</h3>

<input
type="file"
accept=".pdf,.doc,.docx"
multiple>

<br>

<button class="upload-btn">
Upload Assessments
</button>

</div>

</div>

</div>

<footer>
© 2026 Buddharaju Sunayana | Quantum Computing Course Portal
</footer>

</body>
</html>
