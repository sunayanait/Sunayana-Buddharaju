<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Website</title>

<style>
    *{
        margin:0;
        padding:0;
        box-sizing:border-box;
        font-family: Arial, sans-serif;
    }

    body{
        background:#f4f4f4;
    }

    header{
        background:#0077cc;
        color:white;
        padding:20px;
        text-align:center;
    }

    nav{
        background:#005fa3;
        padding:10px;
        text-align:center;
    }

    nav a{
        color:white;
        text-decoration:none;
        margin:0 15px;
    }

    .hero{
        padding:80px 20px;
        text-align:center;
        background:white;
    }

    .hero h1{
        font-size:40px;
        color:#333;
    }

    .hero p{
        margin-top:10px;
        color:#666;
    }

    .btn{
        display:inline-block;
        margin-top:20px;
        padding:12px 25px;
        background:#0077cc;
        color:white;
        text-decoration:none;
        border-radius:5px;
    }

    footer{
        background:#222;
        color:white;
        text-align:center;
        padding:15px;
        margin-top:50px;
    }
</style>
</head>

<body>

<header>
    <h1>My New Website</h1>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">About</a>
    <a href="#">Services</a>
    <a href="#">Contact</a>
</nav>

<section class="hero">
    <h1>Welcome to My Website</h1>
    <p>Create something amazing with HTML and CSS.</p>
    <a class="btn" href="#">Get Started</a>
</section>

<footer>
    <p>© 2026 My Website | All Rights Reserved</p>
</footer>

</body>
</html>
